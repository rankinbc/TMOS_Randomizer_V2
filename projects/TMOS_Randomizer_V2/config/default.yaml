# TMOS Randomizer V2 - Default Configuration
# Version: 2.0.0
#
# This produces a "vanilla-like" experience with minimal but impactful changes.
# Override these settings for more aggressive randomization.

# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================

general:
  # Random seed (0 = generate random seed)
  seed: 0

  # Which chapters to randomize (1-5)
  chapters: [1, 2, 3, 4, 5]

  # Randomization mode
  # "shuffle" = rearrange existing content
  # "generate" = create new layouts (future feature)
  mode: "shuffle"

  # Randomization strategy — which algorithm to use.
  # "organic" = preserve real section shapes from the ROM, shuffle content
  #             with edge-aware placement. Enforces PAST/PRESENT isolation
  #             and walkable-edge alignment by construction.
  # "classic" = the six-phase abstract-shape pipeline (blob/linear shapes).
  strategy: "organic"

# ==============================================================================
# SECTION STRUCTURE
# ==============================================================================

sections:
  # Target section percentages (for future "generate" mode)
  percentages:
    overworld: 30
    dungeon: 20
    maze: 15
    town: 10
    special: 20
    boss: 5

  # Minimum screens per section type
  minimums:
    overworld: 15
    dungeon: 8
    maze: 4
    town: 4
    special: 2
    boss: 2

# ==============================================================================
# SCREEN SHUFFLING
# ==============================================================================

shuffling:
  overworld:
    enabled: true
    shape: "blob"           # blob, linear, branching, grid
    min_width: 3            # Minimum blob width
    connectivity: 0.3       # 0-1, higher = more connections

  towns:
    enabled: true
    count_per_chapter: 2
    min_screens: 3
    max_screens: 6

  mazes:
    enabled: false          # V1: Preserve original mazes
    preserve_traps: true    # Keep intentional asymmetric paths
    complexity: "medium"    # easy, medium, hard

  dungeons:
    enabled: true
    linear: false           # true = single path, false = branching

  special:
    enabled: false          # Unknown dependencies

  boss:
    enabled: false          # NEVER randomize boss areas

# ==============================================================================
# SECTION CONNECTIVITY
# ==============================================================================

connectivity:
  # Section ordering
  dungeon_last: true        # Dungeon always at end of chapter
  order_randomization: true # Random order for other sections

  # Connection patterns
  topology: "branching"     # linear, hub, branching, freeform

  # Connection methods
  overworld_to_town:
    method: "edge"          # edge (walk up), portal
    count_per_town: 1

  overworld_to_maze:
    method: "edge"
    hidden: false           # Require Oprin spell?

  maze_to_dungeon:
    method: "end"           # Connect at maze end

  # Bidirectional consistency
  bidirectional:
    enforce: true           # A->B means B->A
    exceptions: ["maze"]    # Allow asymmetric in mazes

  # Dead end handling
  dead_ends:
    allowed: false
    max_per_section: 0

# ==============================================================================
# TILESECTION HANDLING
# ==============================================================================

tilesections:
  mode: "preserve"          # preserve, shuffle, generate

  shuffle:
    within_chapter: true
    cross_chapter: false
    match_terrain: true     # Desert with desert, etc.

  edges:
    strict_match: true      # Require exact walkability match
    allow_hazard_mismatch: false

# ==============================================================================
# CONTENT (BUILDINGS/NPCS)
# ==============================================================================

content:
  shuffle: true

  shops:
    per_town: 2
    types: ["weapon", "item", "magic"]
    shuffle_inventories: true

  mosques:
    per_town: 1
    required: true          # At least one per chapter

  hotels:
    per_town: 1

  troopers:
    enabled: true
    chapters: [1, 2]

  casinos:
    enabled: true

  allies:
    shuffle: true           # Shuffle ally NPC locations

# ==============================================================================
# CRITICAL PATH / PROGRESSION
# ==============================================================================

critical_path:
  enabled: true
  mode: "beatable"          # beatable, completable

  time_doors:
    enforce_single_in_past: true
    max_shuffle_attempts: 1000

  # Placement restrictions (keep all true for valid game)
  restrictions:
    faruk_underwater: true        # Ch1: Faruk can't be underwater
    mustafa_troll_palace: true    # Ch3: Mustafa can't be in Troll's Palace
    gubibi_lava: true             # Ch4: Gubibi can't be in lava areas
    armor_sabaron_castle: true    # Ch5: Light Armor can't be in Sabaron's Palace
    legend_sword_sabaron: true    # Ch5: Legend Sword can't be in Sabaron's Palace

  # Class requirements
  class_gates:
    ensure_mosque_before: true    # Mosque accessible before class-gated items
    rainy_fighter: true           # Ch4: Fighter class needed for Rainy
    cimaron_saint: true           # Ch3: Saint class needed for Cimaron Seed

  validation:
    building_entrances: true
    wizard_preservation: true
    content_sanity: true

# ==============================================================================
# EXCLUSIONS
# ==============================================================================

exclusions:
  # Always exclude (required for game function)
  boss_screens: true
  victory_screens: true

  # Recommended exclude
  wizard_battles: true

  # Optional
  special_events: true
  enemy_doors: true
  dangerous_events: true

  # Custom exclusions (global screen indices)
  custom_exclude: []

  # Force include (override - use at own risk)
  force_include: []

# ==============================================================================
# DIFFICULTY / VARIETY
# ==============================================================================

difficulty:
  preset: "normal"          # easy, normal, hard, brutal, custom

  # Enemy settings
  enemies:
    preserve_density: true
    shuffle_types: true
    cross_chapter: false    # Mix enemies across chapters

  # Combat scaling
  combat:
    enemy_hp_multiplier: 1.0
    enemy_damage_multiplier: 1.0
    player_damage_multiplier: 1.0

  # Economy
  economy:
    shop_price_multiplier: 1.0
    gold_drop_multiplier: 1.0
    starting_gold: 0

  # Progression
  progression:
    key_item_bias: "balanced"  # early, balanced, late
    sphere_depth: "normal"     # shallow, normal, deep

# Variety settings
variety:
  interesting_combinations:
    enabled: true
    frequency: 0.3          # 30% of seeds have something notable

# ==============================================================================
# VALIDATION
# ==============================================================================

validation:
  # Global settings
  stop_on_first_error: false      # Stop validation on first ERROR
  max_issues_per_validator: 100   # Limit issues per validator (0=unlimited)
  run_incremental: true           # Validate during generation phases
  run_final: true                 # Full validation at end

  # Edge Compatibility - Ensure connected screens have matching walkability
  edge_compatibility:
    enabled: true
    severity: error               # error, warning, info
    max_issues: 100
    min_walkable_tiles: 1         # Minimum walkable tiles per edge
    check_horizontal: true        # Validate left/right edges (6 tiles)
    check_vertical: true          # Validate top/bottom edges (8 tiles)
    allow_hazard_to_hazard: true
    allow_collidable_to_collidable: true

  # Screen Traversability - Ensure player can walk through screens
  screen_traversability:
    enabled: true
    severity: warning
    max_issues: 100
    algorithm: bfs                # Pathfinding algorithm
    require_entry_to_exit: true   # Must reach at least one exit
    allow_partial_exits: true     # OK if some exits unreachable
    treat_hazards_as_blocking: false  # Hazards block movement

  # DataPointer-ObjectSet - Ensure sprite bank compatibility
  datapointer_objectset:
    enabled: true
    severity: error
    max_issues: 100
    strict_mode: true             # Fail on unknown ObjectSets
    allow_unknown_chr: false      # Allow CHR indices not in tables

  # Navigation - Validate bidirectional navigation
  navigation:
    enabled: true
    severity: error
    require_bidirectional: true
    allow_one_way_maze: true

  # Reachability - Ensure all screens reachable
  reachability:
    enabled: true
    severity: error
    min_reachability_percent: 100.0
    check_critical_locations: true

# ==============================================================================
# OUTPUT
# ==============================================================================

output:
  filename: "TMOS_Randomized.nes"

  spoiler_log:
    enabled: true
    text_filename: "spoiler.txt"
    json_filename: "spoiler.json"
    sections:
      header: true
      key_items: true
      all_items: true
      allies: true
      shops: true
      map_layout: true
      spheres: true
      playthrough: true
      special_notes: true

  validation_report: true
